name: Build and Deploy to VPS

# quand une push est faite sur la branche main
on:
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # cloner le repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # construire et pousser les images - API
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./back-django
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/quizpilot_api:latest

      # construire et pousser les images - Client
      - name: Build and push Client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/quizpilot_client:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_N8N_WEBHOOK_URL=${{ secrets.VITE_N8N_WEBHOOK_URL }}

  deploy:
    # needs permet d'attendre la fin du job build-and-push avant de lancer le déploiement
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # cloner le repo (à nouveau, car chaque job est isolé)
      - name: Checkout repository
        uses: actions/checkout@v4

      # créer le dossier sur le VPS distant en SSH
      - name: Create directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p /home/debian/quizpilot-docker

      # copier le fichier docker-compose.prod.yml sur le VPS distant (toujours en ssh)
      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/debian/quizpilot-docker"

      # se connecter en SSH sur le VPS et lancer le déploiement
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          N8N_DB: ${{ secrets.N8N_DB }}
          N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
          N8N_HOST: ${{ secrets.N8N_HOST }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: ${{ secrets.DEBUG }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DJANGO_SUPERUSER_USERNAME: ${{ secrets.DJANGO_SUPERUSER_USERNAME }}
          DJANGO_SUPERUSER_EMAIL: ${{ secrets.DJANGO_SUPERUSER_EMAIL }}
          DJANGO_SUPERUSER_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DB_NAME,DB_USER,DB_PASSWORD,N8N_DB,N8N_ENCRYPTION_KEY,N8N_HOST,ALLOWED_HOSTS,SECRET_KEY,DEBUG,CORS_ALLOWED_ORIGINS,DJANGO_SUPERUSER_USERNAME,DJANGO_SUPERUSER_EMAIL,DJANGO_SUPERUSER_PASSWORD,EMAIL_HOST_USER,EMAIL_HOST_PASSWORD,DEFAULT_FROM_EMAIL,FRONTEND_URL
          script: |
            set -e
            cd /home/debian/quizpilot-docker

            # Génération du fichier .env (les secrets transitent via les variables d'env, pas en clair dans le script)
            cat > .env <<EOF
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_HOST=postgres
            DB_PORT=5432
            N8N_DB=$N8N_DB
            N8N_ENCRYPTION_KEY=$N8N_ENCRYPTION_KEY
            N8N_HOST=$N8N_HOST
            N8N_PROTOCOL=https
            N8N_PROXY_HOPS=1
            N8N_SECURE_COOKIE=false
            N8N_DEFAULT_BINARY_DATA_MODE=filesystem
            WEBHOOK_URL=https://$N8N_HOST/
            ALLOWED_HOSTS=$ALLOWED_HOSTS
            SECRET_KEY=$SECRET_KEY
            DEBUG=$DEBUG
            CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS
            CSRF_TRUSTED_ORIGINS=$CORS_ALLOWED_ORIGINS
            EMAIL_HOST_USER=$EMAIL_HOST_USER
            EMAIL_HOST_PASSWORD=$EMAIL_HOST_PASSWORD
            DEFAULT_FROM_EMAIL=$DEFAULT_FROM_EMAIL
            FRONTEND_URL=$FRONTEND_URL
            EOF
            chmod 600 .env

            # Nettoyage par filtre dynamique (robuste si les noms changent)
            docker ps -q --filter "name=quizpilot" | xargs -r docker stop
            docker ps -aq --filter "name=quizpilot" | xargs -r docker rm -f

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Attendre que l'API soit prête avant de lancer les migrations
            echo "Attente du démarrage de l'API..."
            until docker exec quizpilot_api python manage.py migrate 2>/dev/null; do
              echo "API pas encore prête, nouvel essai dans 5s..."
              sleep 5
            done
            echo "Migrations terminées avec succès"

            # Créer ou mettre à jour le superuser (applique toujours le mot de passe des secrets)
            docker exec \
              -e DJANGO_SUPERUSER_USERNAME="$DJANGO_SUPERUSER_USERNAME" \
              -e DJANGO_SUPERUSER_EMAIL="$DJANGO_SUPERUSER_EMAIL" \
              -e DJANGO_SUPERUSER_PASSWORD="$DJANGO_SUPERUSER_PASSWORD" \
              quizpilot_api \
              python manage.py shell -c "import os; from django.contrib.auth.models import User; u, created = User.objects.get_or_create(username=os.environ['DJANGO_SUPERUSER_USERNAME']); u.email = os.environ['DJANGO_SUPERUSER_EMAIL']; u.set_password(os.environ['DJANGO_SUPERUSER_PASSWORD']); u.is_superuser = True; u.is_staff = True; u.save(); print('Superuser cree' if created else 'Superuser mis a jour')"
